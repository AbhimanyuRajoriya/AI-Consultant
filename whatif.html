<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What If Simulator</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/predict.css">
</head>
<body>
  <div class="back-button-container">
    <button class="back-button" onclick="location.href='index.html'">← Back to Home</button>
  </div>

  <div class="main-container" style="max-width: 1200px;">
    <div class="left-section">
      <h2>What If Simulator</h2>
      <p
      <p class="subtitle">Change values and see how your predicted score changes</p>

      <form id="whatIfForm">
        <div class="form-group">
          <label for="w_study">Study Hours per Day</label>
          <input type="number" step="0.25" min="0" id="w_study" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_att">Attendance %</label>
          <input type="number" step="0.25" min="0" max="100" id="w_att" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_sleep">Sleep Hours</label>
          <input type="number" step="0.25" min="0" max="24" id="w_sleep" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_mental">Mental Health (1-10)</label>
          <input type="number" min="1" max="10" id="w_mental" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_social">Social Media Hours</label>
          <input type="number" step="0.25" min="0" id="w_social" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_netflix">Netflix Hours</label>
          <input type="number" step="0.25" min="0" id="w_netflix" placeholder="Keep blank to use latest saved value">
        </div>

        <div class="form-group">
          <label for="w_diet">Diet Quality</label>
          <select id="w_diet">
            <option value="">Keep latest saved value</option>
            <option value="Poor">Poor</option>
            <option value="Fair">Average</option>
            <option value="Good">Good</option>
          </select>
        </div>

        <button type="submit" class="submit-button">Run Simulation</button>
      </form>
    </div>

    <div class="right-section">
      <div id="result">
        <div class="result-placeholder" id="resultPlaceholder">
          Your simulated score will appear here
        </div>

        <div class="result-content" id="resultContent" style="display: none;">
          <div class="score-label">Simulated Score</div>
          <div class="score-display" id="simScore">--</div>
          <div class="score-badge" id="simRisk">--</div>

          <div id="comparisonBox" style="margin-top: 18px; text-align: left;">
            <div style="font-weight: 700; margin-bottom: 8px;">Comparison</div>
            <div id="comparisonText" style="font-size: 14px; line-height: 1.6;"></div>
          </div>

          <div style="margin-top: 18px; text-align: left;">
            <div style="font-weight: 700; margin-bottom: 10px;">Simulation Inputs</div>
            <div id="simCards" style="
              display:grid;
              grid-template-columns: 1fr 1fr;
              gap:10px;
            "></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/whatif.js"></script>
</body>
</html>
