<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Predict Score</title>
  <link rel="stylesheet" href="css/predict.css">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geo:ital@0;1&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="back-button-container">
    <button class="back-button" onclick="location.href='index.html'">← Back to Home</button>
  </div>

  <div class="main-container">
    <div class="left-section">
      <h2>Student Score Prediction</h2>
      <p class="subtitle">Enter your details to predict academic performance</p>

      <form id="predictForm">
        <div class="form-group">
          <label for="study_hours">Study Hours per Day</label>
          <input type="number" step="0.25" min="0" id="study_hours" required>
        </div>

        <div class="form-group">
          <label for="attendance">Attendance (%)</label>
          <input type="number" step="0.25" min="0" max="100" id="attendance" required>
        </div>

        <div class="form-group">
          <label for="sleep_hours">Sleep Hours</label>
          <input type="number" step="0.25" min="0" max="24" id="sleep_hours" required>
        </div>

        <div class="form-group">
          <label for="mental_health">Mental Health (1-10)</label>
          <input type="number" min="1" max="10" id="mental_health" required>
        </div>

        <div class="form-group">
          <label for="social_media">Social Media Hours</label>
          <input type="number" step="0.25" min="0" id="social_media" required>
        </div>

        <div class="form-group">
          <label for="netflix">Netflix Hours</label>
          <input type="number" step="0.25" min="0" id="netflix" required>
        </div>

        <div class="form-group">
          <label for="diet_quality">Diet Quality</label>
          <select id="diet_quality" required>
            <option value="">Select diet quality</option>
            <option value="Poor">Poor</option>
            <option value="Fair">Average</option>
            <option value="Good">Good</option>
          </select>
        </div>

        <button type="submit" class="submit-button">Predict Score</button>
      </form>
    </div>

    <div class="right-section">
      <div id="result">
        <div class="result-placeholder">Your predicted score will appear here</div>
        <div class="result-content" id="resultContent">
          <div class="score-label">Predicted Score</div>
          <div class="score-display" id="scoreDisplay">--</div>
          <div class="score-badge" id="scoreBadge">--</div>
          <div style="margin-top:12px; font-size: 14px;" id="extraInfo"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/predict.js"></script>
</body>
</html>
